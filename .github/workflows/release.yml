name: Release

# Builds and publishes real, installable HiddenSteps binaries — the thing
# README.md's old "Status" section said didn't exist yet. Triggered by
# pushing a `v*.*.*` tag (or manually via workflow_dispatch for a dry run).
#
# Signing/notarization are NOT configured (no Apple Developer / code-signing
# certificates available) — builds are real and installable but unsigned.
# macOS users will need to right-click → Open (or `xattr -d
# com.apple.quarantine`) past Gatekeeper the first time; Windows may show an
# unrecognized-publisher SmartScreen prompt. This is disclosed in the release
# notes, not hidden.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            curl wget file patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: apps/desktop/ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/desktop/ui
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "HiddenSteps ${{ github.ref_name }}"
          releaseBody: |
            Early, unsigned build — see the repo README for current status and the honest list of what does and doesn't work yet.

            - **macOS**: Gatekeeper will block an unsigned app. Right-click the app → Open, or `xattr -d com.apple.quarantine /path/to/HiddenSteps.app`.
            - **Windows**: SmartScreen may warn about an unrecognized publisher. Click "More info" → "Run anyway".
            - **Linux**: the AppImage should just run (`chmod +x` it first).
          releaseDraft: true
          prerelease: true
